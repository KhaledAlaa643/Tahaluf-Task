<div class="max-w-4xl mx-auto mt-10">

  <div class="flex justify-between items-center mb-6 px-2">
    <h2 class="text-2xl font-bold text-gray-800">My Tasks</h2>
    <p-button (onClick)="openDialog()" label="New Task" icon="pi pi-plus" size="small" />
  </div>

  <app-task-filter />
  <p-table [value]="tasks()" [paginator]="true" [rows]="5" class="p-datatable-striped">
    <ng-template pTemplate="header">
      <tr>
        <th></th>
        <th>Title</th>
        <th>Description</th>
        <th>Priority</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-task>
      <tr [class.opacity-60]="task.status === 'completed'">
        <td>
          <p-button (onClick)="toggleTaskStatus(task.id)"
            [icon]="task.status === 'completed' ? 'pi pi-check-circle' : 'pi pi-circle'" text rounded
            [severity]="task.status === 'completed' ? 'success' : 'secondary'" />
        </td>
        <td [class.line-through]="task.status === 'completed'" class="font-semibold text-gray-800">
          {{ task.title }}
        </td>
        <td [class.line-through]="task.status === 'completed'" class="text-gray-500 text-sm">
          {{ task.description }}
        </td>
        <td>
          <p-tag [value]="task.priority" [severity]="getPrioritySeverity(task.priority)"
            class="uppercase text-[10px]" />
        </td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-pencil" (onClick)="openDialog(task)" text rounded severity="info" size="small" />
            <p-button icon="pi pi-times" (onClick)="onDeleteTask(task)" text rounded severity="danger" size="small" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="empty">
      <tr>
        <td colspan="5" class="text-center py-12 text-gray-500">
          <p class="text-lg">No tasks found matching your filters.</p>
          <p class="text-sm mt-1 text-gray-400">Try adjusting your search query</p>
        </td>
      </tr>
    </ng-template>
  </p-table>

  @if(displayDialog()) {
  <app-task-form [task]="selectedTask()" [visible]="displayDialog()" (visibleChange)="displayDialog.set($event)" />
  }

</div>

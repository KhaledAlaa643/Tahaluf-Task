<div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 mb-6 space-y-4">
  <div class="w-full">
    <p-iconfield iconPosition="left" class="w-full">
      <p-inputicon class="pi pi-search" />
      <input type="text" pInputText placeholder="Deep search tasks by title or description..."
        class="w-full pl-10 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"
        [(ngModel)]="searchQuery" (ngModelChange)="onFilterChange()" />
    </p-iconfield>
  </div>

  <div class="flex flex-col md:flex-row gap-4">
    <div class="flex-1">
      <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
      <p-multiselect [options]="statusOptions" [(ngModel)]="selectedStatuses" (onChange)="onFilterChange()"
        optionLabel="label" optionValue="value" placeholder="Select Statuses" class="w-full border rounded-lg" />
    </div>

    <div class="flex-1">
      <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
      <p-multiselect [options]="priorityOptions" [(ngModel)]="selectedPriorities" (onChange)="onFilterChange()"
        optionLabel="label" optionValue="value" placeholder="Select Priorities" class="w-full border rounded-lg" />
    </div>
  </div>
</div>

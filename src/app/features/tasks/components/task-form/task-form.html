<p-dialog [(visible)]="visible" [header]="dialogHeader()" [modal]="true" [style]="{'width':'40rem'}"
    (visibleChange)="visibleChange.emit($event)" [resizable]="false" (onHide)="close()" [draggable]="false">

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 pt-2">

        <div class="field">
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input id="title" type="text" pInputText formControlName="title" class="w-full border rounded-lg"
                placeholder="Enter task title" />
        </div>

        <div class="field">
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea id="description" pTextarea formControlName="description" rows="3" class="w-full border rounded-lg"
                placeholder="Enter task description"></textarea>
        </div>

        <div class="flex flex-col sm:flex-row gap-4">
            <div class="field flex-1">
                <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                <p-select id="status" [options]="statusOptions" formControlName="status" optionLabel="label"
                    optionValue="value" class="w-full border rounded-lg" />
            </div>

            <div class="field flex-1">
                <label for="priority" class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                <p-select id="priority" [options]="priorityOptions" formControlName="priority" optionLabel="label"
                    optionValue="value" class="w-full border rounded-lg" />
            </div>
        </div>

        <div class="flex justify-end gap-2 mt-4 pt-4">
            <p-button label="Cancel" severity="secondary" (onClick)="close()" />
            <p-button label="Save" type="submit" [disabled]="taskForm.invalid" />
        </div>
    </form>
</p-dialog>
